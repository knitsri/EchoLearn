<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoLearn | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script> <!-- Will create this briefly for shared styles, or just inline it -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        neonBlue: '#00f0ff', neonPurple: '#8a2be2', neonPink: '#ff007f',
                        darkBg: '#0a0b10'
                    },
                    animation: {
                        'pulse-glow': 'pulse-glow 2s infinite',
                        'blob': 'blob 7s infinite',
                        'enter-slide-up': 'slideUp 0.6s forwards'
                    },
                    keyframes: {
                        'pulse-glow': { '0%, 100%': { opacity: '0.4', transform: 'scale(1)' }, '50%': { opacity: '0.8', transform: 'scale(1.05)' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        blob: { '0%, 100%': { transform: 'translate(0px, 0px) scale(1)' }, '33%': { transform: 'translate(30px, -50px) scale(1.1)' }, '66%': { transform: 'translate(-20px, 20px) scale(0.9)' } }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 transition-colors duration-700 min-h-screen flex items-center justify-center relative overflow-hidden font-sans">
    
    <div id="bg-canvas" class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="blob shape-1 absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] bg-neonPurple/20 rounded-full mix-blend-screen filter blur-[80px] animate-blob"></div><div class="blob shape-2 absolute top-[20%] right-[-10%] w-[35vw] h-[35vw] bg-neonBlue/20 rounded-full mix-blend-screen filter blur-[80px] animate-blob" style="animation-delay: 2s"></div><div class="blob shape-3 absolute bottom-[-20%] left-[20%] w-[45vw] h-[45vw] bg-neonPink/20 rounded-full mix-blend-screen filter blur-[80px] animate-blob" style="animation-delay: 4s"></div>
    </div>

    <main class="w-full max-w-md relative z-10 p-6 animate-enter-slide-up">
        <div class="absolute -inset-1 bg-gradient-to-r from-neonBlue via-neonPurple to-neonPink rounded-[2rem] blur-xl opacity-20 dark:opacity-40 animate-pulse-glow"></div>
        <div class="relative bg-white/70 dark:bg-[#12131a]/70 backdrop-blur-2xl border border-white/60 dark:border-white/10 rounded-[2rem] p-8 shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 mx-auto bg-gradient-to-tr from-neonBlue to-neonPurple rounded-full flex items-center justify-center shadow-lg mb-4"><i class="ri-login-circle-line text-white text-2xl"></i></div>
                <h1 class="text-3xl font-bold mb-2">Welcome Back</h1>
                <p class="text-gray-500 dark:text-gray-400">Sign in to continue to EchoLearn</p>
            </div>
            <form onsubmit="handleLogin(event)" class="space-y-6">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i class="ri-mail-line text-gray-400"></i></div>
                    <input type="email" id="login-email" class="w-full bg-white/50 dark:bg-black/30 border border-gray-200 dark:border-white/10 rounded-xl py-3 pl-11 pr-4 focus:ring-2 focus:ring-neonBlue outline-none transition-all dark:text-white" placeholder="Email Address" required>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i class="ri-lock-2-line text-gray-400"></i></div>
                    <input type="password" id="login-password" class="w-full bg-white/50 dark:bg-black/30 border border-gray-200 dark:border-white/10 rounded-xl py-3 pl-11 pr-4 focus:ring-2 focus:ring-neonPurple outline-none transition-all dark:text-white" placeholder="Password" required>
                </div>
                <button type="submit" class="w-full bg-gray-900 dark:bg-white text-white dark:text-gray-900 font-medium py-3 rounded-xl hover:scale-[1.02] active:scale-95 transition-all shadow-xl shadow-gray-900/20 dark:shadow-white/10">Sign In</button>
            </form>
            <div class="mt-8 text-center text-sm"><span class="text-gray-500">Don't have an account?</span> <a href="signup.html" class="text-neonPurple hover:text-neonPink font-medium ml-1">Create one</a></div>
        </div>
    </main>
    
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            checkAuth(false);
        });
    </script>
</body>
</html>
